name: Install Recruiter Assistant Site-wide

on:
  workflow_dispatch:
  push:
    branches: [master]
    paths:
      - '.github/workflows/install-recruiter-assistant.yml'
      - 'assets/recruiter-assistant.js'

permissions:
  contents: write

jobs:
  install:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Add Recruiter Assistant to every HTML page
        run: |
          python - <<'PY'
          from pathlib import Path

          script_tag = '<script src="/assets/recruiter-assistant.js" defer></script>'
          changed = []

          for path in Path('.').rglob('*.html'):
              if '.git' in path.parts:
                  continue
              html = path.read_text(encoding='utf-8')
              if script_tag in html:
                  continue
              if '</body>' not in html:
                  continue
              html = html.replace('</body>', f'{script_tag}\n</body>', 1)
              path.write_text(html, encoding='utf-8')
              changed.append(str(path))

          print(f'Updated {len(changed)} page(s):')
          for item in changed:
              print(f' - {item}')
          PY

      - name: Commit installation
        run: |
          if git diff --quiet; then
            echo "No changes needed."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "4189826+github-actions[bot]@users.noreply.github.com"
          git add '**/*.html' '*.html'
          git commit -m "Install Recruiter Assistant across all pages"
          git push