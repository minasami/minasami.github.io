name: Install Career Brand Enhancements Site-wide

on:
  workflow_dispatch:
  push:
    branches: [master]
    paths:
      - '.github/workflows/install-recruiter-assistant.yml'
      - 'assets/recruiter-assistant.js'
      - 'assets/site-enhancements.js'
      - 'assets/site-enhancements.css'
      - 'assets/experience-router.js'
      - 'assets/growth-navigation.js'
      - 'assets/homepage-priority-router.js'
      - 'assets/roadmap-integration.js'
      - 'assets/case-study-proof-router.js'
      - 'assets/medicine-support-hub-deployment.js'

permissions:
  contents: write

jobs:
  install:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Add optimization assets to every HTML page
        run: |
          python - <<'PY'
          from pathlib import Path

          assistant = '<script src="/assets/recruiter-assistant.js" defer></script>'
          enhancements = '<script src="/assets/site-enhancements.js" defer></script>'
          router = '<script src="/assets/experience-router.js" defer></script>'
          growth = '<script src="/assets/growth-navigation.js" defer></script>'
          roadmap = '<script src="/assets/roadmap-integration.js" defer></script>'
          caseproof = '<script src="/assets/case-study-proof-router.js" defer></script>'
          mshdeploy = '<script src="/assets/medicine-support-hub-deployment.js" defer></script>'
          homepage = '<script src="/assets/homepage-priority-router.js" defer></script>'
          styles = '<link rel="stylesheet" href="/assets/site-enhancements.css">'
          changed = []

          for path in Path('.').rglob('*.html'):
              if '.git' in path.parts:
                  continue
              html = path.read_text(encoding='utf-8')
              original = html

              if styles not in html and '</head>' in html:
                  html = html.replace('</head>', f'{styles}\n</head>', 1)
              if enhancements not in html and '</body>' in html:
                  html = html.replace('</body>', f'{enhancements}\n</body>', 1)
              if router not in html and '</body>' in html:
                  html = html.replace('</body>', f'{router}\n</body>', 1)
              if growth not in html and '</body>' in html:
                  html = html.replace('</body>', f'{growth}\n</body>', 1)
              if roadmap not in html and '</body>' in html:
                  html = html.replace('</body>', f'{roadmap}\n</body>', 1)
              if caseproof not in html and '</body>' in html:
                  html = html.replace('</body>', f'{caseproof}\n</body>', 1)
              if mshdeploy not in html and '</body>' in html:
                  html = html.replace('</body>', f'{mshdeploy}\n</body>', 1)
              if path == Path('index.html') and homepage not in html and '</body>' in html:
                  html = html.replace('</body>', f'{homepage}\n</body>', 1)
              if assistant not in html and '</body>' in html:
                  html = html.replace('</body>', f'{assistant}\n</body>', 1)

              if path == Path('index.html'):
                  html = html.replace('<a href="/digital-health-project-management/">Digital Health Guide</a><a href="/executive-brief/">Executive Brief</a><a href="/digital-health-project-management/">Digital Health Guide</a><a href="/executive-brief/">Executive Brief</a><a href="/digital-health-project-management/">Digital Health Guide</a><a href="/executive-brief/">Executive Brief</a>', '<a href="/digital-health-command-center/">Command Center</a><a href="/site-growth-control-center/">Growth Center</a><a href="/resource-library/">Resource Library</a><a href="/digital-health-project-management/">Digital Health Guide</a><a href="/executive-brief/">Executive Brief</a>')
                  html = html.replace('<a href="#impact">Impact</a><a href="/digital-health-project-management/">Digital Health Guide</a><a href="/executive-brief/">Executive Brief</a>', '<a href="#impact">Impact</a><a href="/digital-health-command-center/">Command Center</a><a href="/site-growth-control-center/">Growth Center</a><a href="/resource-library/">Resource Library</a><a href="/digital-health-project-management/">Digital Health Guide</a><a href="/executive-brief/">Executive Brief</a>', 1)
                  html = html.replace('<a class="btn primary" href="/digital-health-command-center/">Open Command Center</a>', '<a class="btn primary" href="/site-growth-control-center/">Open Growth Center</a>', 1)

              if html != original:
                  path.write_text(html, encoding='utf-8')
                  changed.append(str(path))

          print(f'Updated {len(changed)} page(s):')
          for item in changed:
              print(f' - {item}')
          PY

      - name: Commit installation
        run: |
          if git diff --quiet; then
            echo "No changes needed."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add '**/*.html' '*.html'
          git commit -m "Apply growth navigation site-wide"
          git push