name: Install Recruiter Assistant

on:
  workflow_dispatch:
  push:
    branches: [master]
    paths:
      - '.github/workflows/install-recruiter-assistant.yml'
      - 'assets/recruiter-assistant.js'

permissions:
  contents: write

jobs:
  install:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Add assistant script and improved quick prompts
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('index.html')
          html = path.read_text(encoding='utf-8')

          script_tag = '<script src="/assets/recruiter-assistant.js" defer></script>'
          if script_tag not in html:
              html = html.replace('</body>', script_tag + '\n</body>', 1)

          old_quick = '<div class="quick"><button onclick="preset(\'project management\')">PM experience</button><button onclick="preset(\'Medicine Support Hub\')">Medicine Hub</button><button onclick="preset(\'availability\')">Availability</button><button onclick="preset(\'contact\')">Contact</button></div>'
          new_quick = '<div class="quick"><button onclick="preset(\'project management and PMO experience\')">PMO experience</button><button onclick="preset(\'Medicine Support Hub\')">Medicine Hub</button><button onclick="preset(\'Employee Support Program transformation\')">ESP transformation</button><button onclick="preset(\'leadership and stakeholder management\')">Leadership</button><button onclick="preset(\'PMP certification status\')">PMP status</button><button onclick="preset(\'best-fit roles\')">Role fit</button><button onclick="preset(\'contact details\')">Contact</button></div>'
          if old_quick in html:
              html = html.replace(old_quick, new_quick, 1)

          old_intro = 'Ask about projects, skills, healthcare experience, availability or contact details.'
          new_intro = 'Ask about PMO experience, projects, healthcare, leadership, credentials, role fit, availability or contact details.'
          html = html.replace(old_intro, new_intro, 1)

          path.write_text(html, encoding='utf-8')
          PY

      - name: Commit installation
        run: |
          if git diff --quiet; then
            echo "No changes needed."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          git commit -m "Upgrade recruiter assistant with verified knowledge base"
          git push
