name: Site Quality Checks

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:
  schedule:
    - cron: "7 2 * * 0"

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Audit healthcare hub internal links
        run: python scripts/healthcare_hub_maintenance.py

      - name: Validate HTML files
        run: npx --yes html-validate@latest "**/*.html"

      - name: Check published website links
        run: npx --yes linkinator@latest https://minasami.github.io/ --recurse --skip "medicine-support-hub--minasamitawfik.replit.app|linkedin.com"

      - name: Audit homepage
        run: npx --yes lighthouse@latest https://minasami.github.io/ --chrome-flags="--headless --no-sandbox" --output=json --output-path=./lighthouse-home.json

      - name: Audit healthcare hub
        run: npx --yes lighthouse@latest https://minasami.github.io/healthcare-transformation/ --chrome-flags="--headless --no-sandbox" --output=json --output-path=./lighthouse-healthcare.json

      - name: Enforce accessibility and SEO thresholds
        run: |
          node -e "for(const f of ['lighthouse-home.json','lighthouse-healthcare.json']){const r=require('./'+f),c=r.categories;console.log(f,{performance:c.performance.score,accessibility:c.accessibility.score,bestPractices:c['best-practices'].score,seo:c.seo.score});if(c.accessibility.score<0.85||c.seo.score<0.85)process.exit(1)}"

      - name: Upload Lighthouse reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-reports
          path: |
            lighthouse-home.json
            lighthouse-healthcare.json
