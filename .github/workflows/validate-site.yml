name: Validate Site Quality

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run site validation
        run: python scripts/validate-site.py
      - name: Check decision routes
        run: |
          test -f decision-navigator/index.html
          test -f digital-health-readiness-assessment/index.html
          test -f assets/decision-brief-bridge.js
          test -f assets/readiness-assessment.js
          grep -F '/assets/decision-brief-bridge.js' decision-navigator/index.html
          grep -F '/assets/decision-brief-bridge.js' digital-health-readiness-assessment/index.html
          grep -F 'data-decision-brief-context' digital-health-readiness-assessment/index.html
