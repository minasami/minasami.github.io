name: Site Link Check

on:
  workflow_dispatch:
  schedule:
    - cron: "43 5 * * 3"
  push:
    branches: [master]
    paths:
      - "**/*.html"
      - "**/*.md"
      - ".github/workflows/site-link-check.yml"

permissions:
  contents: read
  issues: write

jobs:
  links:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check repository links
        id: lychee
        uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            --no-progress
            --exclude-mail
            --exclude "linkedin.com"
            --exclude "localhost"
            "**/*.html"
            "**/*.md"
          fail: true

      - name: Create or update link-check issue
        if: failure()
        uses: peter-evans/create-issue-from-file@v5
        with:
          title: "Automated link check needs attention"
          content-filepath: ./lychee/out.md
          labels: maintenance,automated-check
