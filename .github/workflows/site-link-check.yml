name: Site Link Check

on:
  workflow_dispatch:
  schedule:
    - cron: "43 5 * * 3"
  push:
    branches: [master]
    paths:
      - "**/*.html"
      - "**/*.md"
      - "scripts/check_links.py"
      - ".github/workflows/site-link-check.yml"

permissions:
  contents: read

jobs:
  links:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Check internal repository links
        run: python scripts/check_links.py

      - name: Check external links
        uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            --no-progress
            --exclude-mail
            --exclude "^/"
            --exclude "linkedin.com"
            --exclude "localhost"
            --exclude "wa.me"
            "**/*.html"
            "**/*.md"
          fail: true
