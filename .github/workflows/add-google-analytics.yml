name: Add Google Analytics

on:
  workflow_dispatch:
  push:
    branches: [master]
    paths:
      - '.github/workflows/add-google-analytics.yml'

permissions:
  contents: write

jobs:
  add-ga4:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Add GA4 tracking and recruiter events
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('index.html')
          html = path.read_text(encoding='utf-8')

          marker = 'G-RWM4XN0FL5'
          if marker not in html:
              ga = '''<!-- Google tag (gtag.js) -->
          <script async src="https://www.googletagmanager.com/gtag/js?id=G-RWM4XN0FL5"></script>
          <script>
            window.dataLayer = window.dataLayer || [];
            function gtag(){dataLayer.push(arguments);}
            gtag('js', new Date());
            gtag('config', 'G-RWM4XN0FL5', { anonymize_ip: true });
          </script>
          '''
              html = html.replace('</head>', ga + '</head>', 1)

          event_js = '''
          <script>
          document.addEventListener('DOMContentLoaded', function () {
            function track(name, params) {
              if (typeof gtag === 'function') gtag('event', name, params || {});
            }
            document.addEventListener('click', function (event) {
              const link = event.target.closest('a');
              if (!link) return;
              const href = link.getAttribute('href') || '';
              const text = (link.textContent || '').trim().toLowerCase();

              if (href.includes('medicine-support-hub') || text.includes('live demo')) track('open_medicine_support_hub', {link_url: href});
              else if (href.includes('linkedin.com')) track('visit_linkedin', {link_url: href});
              else if (href.includes('github.com')) track('visit_github', {link_url: href});
              else if (href.startsWith('https://wa.me/')) track('click_whatsapp', {link_url: href});
              else if (href.startsWith('mailto:')) track(text.includes('meeting') ? 'book_meeting' : 'click_email', {link_url: href});
              else if (href.toLowerCase().endswith('.pdf') || text.includes('download cv')) track('download_cv', {link_url: href});
              else if (href.startsWith('/projects') || href.includes('#projects')) track('view_projects', {link_url: href});
              else if (href.startsWith('/research')) track('view_research', {link_url: href});
              else if (href.startsWith('/publications')) track('view_publications', {link_url: href});
              else if (href.startsWith('/experience') || href.includes('#career')) track('view_experience', {link_url: href});
            });
          });
          </script>
          '''
          if 'open_medicine_support_hub' not in html:
              html = html.replace('</body>', event_js + '</body>', 1)

          path.write_text(html, encoding='utf-8')
          PY

      - name: Commit tracking changes
        run: |
          if git diff --quiet; then
            echo "No changes needed."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          git commit -m "Add Google Analytics 4 and recruiter event tracking"
          git push
